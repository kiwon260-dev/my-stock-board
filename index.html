<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET FACT BOARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #f0f7ff; --box-bg: #ffffff; --accent-blue: #0095ff; --up-color: #ff3b30; --down-color: #007aff; --radius: 18px; }
        body { margin: 0; padding: 20px; background-color: var(--main-bg); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; }
        .logo { font-size: 18px; font-weight: 800; color: var(--accent-blue); }
        .live-tag { font-family: 'JetBrains Mono'; font-size: 26px; font-weight: 800; }
        /* 4열 그리드 복구 */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 12px; flex-grow: 1; }
        .info-box { background: var(--box-bg); border-radius: var(--radius); padding: 18px; border: 1px solid rgba(0, 149, 255, 0.08); box-shadow: 0 4px 12px rgba(0, 149, 255, 0.03); }
        .box-title { font-size: 11px; font-weight: 800; color: #8fa1b3; margin-bottom: 12px; text-transform: uppercase; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f8fafd; }
        .ticker-name { font-weight: 600; font-size: 13px; color: #445566; }
        .price { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 14px; text-align: right; }
        .up { color: var(--up-color); } .down { color: var(--down-color); }
        footer { margin-top: 15px; background: #1a2b3c; border-radius: 10px; height: 40px; display: flex; align-items: center; color: white; font-size: 13px; padding: 0 15px; font-weight: 600; }
    </style>
</head>
<body>
    <header><div class="logo">MARKET FACT BOARD</div><div class="live-tag" id="live-clock">00:00:00</div></header>
    <div class="dashboard-grid">
        <div class="info-box"><div class="box-title">미국 주요 지수</div><div id="box-us_futures"></div></div>
        <div class="info-box"><div class="box-title">글로벌 지표</div><div id="box-global_idx"></div></div>
        <div class="info-box"><div class="box-title">외환 및 채권</div><div id="box-fx_bond"></div></div>
        <div class="info-box"><div class="box-title">가상자산</div><div id="box-crypto"></div></div>
        <div class="info-box"><div class="box-title">원자재</div><div id="box-commodity"></div></div>
        <div class="info-box"><div class="box-title">산업 지표</div><div id="box-industry"></div></div>
        <div class="info-box"><div class="box-title">국내 증시</div><div id="box-korea"></div></div>
        <div class="info-box"><div class="box-title" style="color: #ff3b30;">리스크 관리</div><div id="box-risk"></div></div>
    </div>
    <footer><div id="news-display">📢 데이터 동기화 중...</div></footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBi3tmz6lbSqQ4b99iQF6ZsvYp9CB_UnEU",
            authDomain: "stock-f04e2.firebaseapp.com",
            databaseURL: "https://stock-f04e2-default-rtdb.firebaseio.com",
            projectId: "stock-f04e2",
            storageBucket: "stock-f04e2.firebasestorage.app",
            appId: "1:345477021822:web:1490fd49ca2f96c130982f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        db.ref('market_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 뉴스 업데이트
            if (data.news) document.getElementById('news-display').innerText = data.news;

            // 시세 업데이트 (4열 그리드 8개 박스 모두 대응)
            const ids = ['us_futures', 'global_idx', 'fx_bond', 'crypto', 'commodity', 'industry', 'korea', 'risk'];
            ids.forEach(id => {
                const container = document.getElementById(`box-${id}`);
                if (container && data[id]) {
                    container.innerHTML = data[id].map(item => `
                        <div class="data-row">
                            <span class="ticker-name">${item.name}</span>
                            <div>
                                <div class="price">${Number(item.price).toLocaleString(undefined, {minimumFractionDigits:2})}</div>
                                <div class="price ${item.percent >= 0 ? 'up' : 'down'}" style="font-size:11px">
                                    ${item.percent >= 0 ? '+' : ''}${item.percent}%
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            });
        });
    </script>
</body>
</html>
